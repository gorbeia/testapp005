name = "aditzak-feedback"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Non-secret configuration. Override per-environment with `wrangler.toml`
# environments or `wrangler deploy --var KEY:value` if needed.
[vars]
# Origin allowed to call this worker (no trailing slash).
ALLOWED_ORIGIN = "https://mintzan.github.io"
# Mailbox that receives feedback.
FEEDBACK_TO_EMAIL = "inakiibarrola@yahoo.es"
# Resend "from" address. Must be on a domain verified in Resend, or
# "onboarding@resend.dev" for testing (see docs/CLOUDFLARE_FEEDBACK_WORKER.md).
FEEDBACK_FROM_EMAIL = "onboarding@resend.dev"

# Set with: wrangler secret put RESEND_API_KEY
# RESEND_API_KEY
