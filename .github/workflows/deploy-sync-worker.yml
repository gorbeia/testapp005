name: Deploy sync worker

on:
  push:
    branches: [main]
    paths:
      - 'sync-worker/**'
      - '.github/workflows/deploy-sync-worker.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-sync-worker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sync-worker/package-lock.json
      - run: npm ci
        working-directory: sync-worker
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: sync-worker
          command: |
            d1 migrations apply aditzak-sync --remote
            deploy
